<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Braille Learning System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Braille Learning System</h1>
    <p class="subtitle">Electron Desktop Prototype</p>

    <section class="card">
      <h2>Practice Submission</h2>

      <div class="braille-input-section">
        <h3>Expected dots</h3>
        <div class="braille-cell" id="expectedCell">
          <button class="dot" data-group="expected" data-dot="1"></button>
          <button class="dot" data-group="expected" data-dot="4"></button>
          <button class="dot" data-group="expected" data-dot="2"></button>
          <button class="dot" data-group="expected" data-dot="5"></button>
          <button class="dot" data-group="expected" data-dot="3"></button>
          <button class="dot" data-group="expected" data-dot="6"></button>
        </div>
        <p id="expectedDotsText">Selected: None</p>
        <button id="clearExpectedBtn" class="secondary-btn">Clear Expected</button>
      </div>

      <div class="braille-input-section">
        <h3>Actual dots</h3>
        <div class="braille-cell" id="actualCell">
          <button class="dot" data-group="actual" data-dot="1"></button>
          <button class="dot" data-group="actual" data-dot="4"></button>
          <button class="dot" data-group="actual" data-dot="2"></button>
          <button class="dot" data-group="actual" data-dot="5"></button>
          <button class="dot" data-group="actual" data-dot="3"></button>
          <button class="dot" data-group="actual" data-dot="6"></button>
        </div>
        <p id="actualDotsText">Selected: None</p>
        <button id="clearActualBtn" class="secondary-btn">Clear Actual</button>
      </div>

      <button id="submitBtn">Submit Practice</button>

      <div class="result-box" id="resultBox">
        <p>Result will appear here.</p>
      </div>

      <div class="result-box" id="explanationBox">
        <p>Explanation will appear here.</p>
      </div>
    </section>

    <section class="card">
      <h2>Learning Statistics</h2>
      <button id="loadStatsBtn">Load Stats Summary</button>
      <div class="result-box" id="statsBox">
        <p>Total Attempts: -</p>
        <p>Correct Attempts: -</p>
        <p>Accuracy: -</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
